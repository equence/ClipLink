name: Build releases

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: win64_msvc2022_64
          - platform: macos
            os: macos-13
            arch: clang_64
          - platform: linux
            os: ubuntu-latest
            arch: linux_gcc_64
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: ${{ matrix.arch }}

      - name: Set up MSVC
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure Windows
        if: matrix.platform == 'windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=cl

      - name: Configure macOS and Linux
        if: matrix.platform != 'windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test Linux headlessly
        if: matrix.platform == 'linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

      - name: Test Windows and macOS
        if: matrix.platform != 'linux'
        run: ctest --test-dir build --output-on-failure

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: cliplink-${{ matrix.platform }}
          path: |
            build/cliplink_server*
            build/cliplink_client*
          if-no-files-found: error
