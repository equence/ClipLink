name: Build releases

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: win64_msvc2022_64
          - platform: macos
            os: macos-14
            arch: clang_arm64
          - platform: linux
            os: ubuntu-latest
            arch: linux_gcc_64
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Qt 6
        if: matrix.platform != 'macos'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: ${{ matrix.arch }}

      - name: Install native Apple Silicon Qt
        if: matrix.platform == 'macos'
        run: brew install qtbase

      - name: Set up MSVC
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure Windows
        if: matrix.platform == 'windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=cl

      - name: Configure macOS
        if: matrix.platform == 'macos'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix qtbase)"

      - name: Configure Linux
        if: matrix.platform == 'linux'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test Linux headlessly
        if: matrix.platform == 'linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

      - name: Test Windows and macOS
        if: matrix.platform != 'linux'
        run: ctest --test-dir build --output-on-failure

      - name: Package Apple Silicon DMG
        if: matrix.platform == 'macos'
        run: |
          mkdir -p dist/ClipLink.app/Contents/MacOS
          cp build/cliplink_client dist/ClipLink.app/Contents/MacOS/ClipLink
          cat > dist/ClipLink.app/Contents/Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>ClipLink</string>
            <key>CFBundleIdentifier</key><string>com.equence.cliplink</string>
            <key>CFBundleName</key><string>ClipLink</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${{ github.ref_name }}</string>
          </dict></plist>
          EOF
          "$(brew --prefix qtbase)/bin/macdeployqt" dist/ClipLink.app
          hdiutil create -volname ClipLink -srcfolder dist/ClipLink.app -ov -format UDZO dist/ClipLink-macos-arm64.dmg

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: cliplink-${{ matrix.platform }}
          path: |
            build/cliplink_server*
            build/cliplink_client*
            dist/ClipLink-macos-arm64.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download platform binaries
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package platform builds
        run: |
          mkdir release
          for platform in windows macos linux; do
            tar -czf "release/ClipLink-${platform}.tar.gz" -C "dist/cliplink-${platform}" .
          done
          cp dist/cliplink-macos/ClipLink-macos-arm64.dmg release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.dmg
